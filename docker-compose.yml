version: '3.8'

services:
  bot:
    build: .
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=${MONGO_URI}
      - BOT_TOKEN=${BOT_TOKEN}
    restart: always

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

volumes:
  mongodb_data: 